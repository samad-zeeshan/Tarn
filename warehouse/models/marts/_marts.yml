version: 2

models:
  - name: fact_auth_event
    description: |
      Grain: one row per authentication event. All 1,051,430,459 of them.

      A view over the Parquet lake, joined on natural keys. The model header explains why.
      Referential integrity is still enforced across every row by the relationships tests below.
    columns:
      - name: src_user
        description: "FK -> dim_identity.identity_name. The authenticating identity."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_identity')
              field: identity_name
      - name: src_computer
        description: "FK -> dim_computer.computer_name (the host authenticated FROM)."
        data_tests:
          - relationships:
              to: ref('dim_computer')
              field: computer_name
      - name: dst_computer
        description: "FK -> dim_computer.computer_name (the host authenticated TO)."
        data_tests:
          - relationships:
              to: ref('dim_computer')
              field: computer_name
      - name: event_date
        description: "FK -> dim_time.calendar_date (day grain)."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_time')
              field: calendar_date
      - name: event_count
        description: "Additive measure, always 1. Sums to the event count of any slice."
        data_tests: [not_null]
      - name: is_redteam
        description: "True iff this exact event is one of LANL's 749 labelled compromise events."
        data_tests: [not_null]
      - name: outcome
        data_tests:
          - accepted_values:
              values: ["Success", "Fail"]
              config:
                # LANL leaves the field as '?' on a minority of rows; those become NULL in
                # staging and are legitimately neither Success nor Fail.
                where: "outcome is not null"

  - name: dim_identity
    description: |
      Grain: one row per authenticating identity, human or machine account. SCD type 1.

      Machine accounts are the majority of traffic and are kept. Excluding them is a decision
      each query makes for itself, and filtering here would silently change every number.
    columns:
      - name: identity_key
        data_tests: [unique, not_null]
      - name: identity_name
        data_tests: [unique, not_null]
      - name: is_machine_account
        data_tests: [not_null]
      - name: is_compromised
        description: "True iff this identity appears in LANL's red-team ground truth (104 of them)."
        data_tests: [not_null]
      - name: total_auth_events
        data_tests: [not_null]

  - name: dim_computer
    description: |
      Grain: one row per host, whether it appeared as a source, a destination, or both.

      is_redteam_pivot marks the four hosts the red team launched from. A tiny flag, but it is
      the entry point for the graph queries.
    columns:
      - name: computer_key
        data_tests: [unique, not_null]
      - name: computer_name
        data_tests: [unique, not_null]
      - name: host_role
        data_tests:
          - accepted_values:
              values: ["destination_only", "source_only", "server_like", "workstation_like"]
      - name: is_redteam_pivot
        data_tests: [not_null]

  - name: dim_time
    description: |
      Grain: one row per day of the corpus. 58 rows.

      calendar_date is a label, not an observation. LANL ships relative seconds. That is why
      there is no day-of-week column: it would be fiction.
    columns:
      - name: time_key
        data_tests: [unique, not_null]
      - name: calendar_date
        data_tests: [unique, not_null]
      - name: day_index
        data_tests: [unique, not_null]
      - name: has_redteam_activity
        data_tests: [not_null]

  - name: mart_daily_identity_rollup
    description: |
      Grain: one row per identity per day. The aggregate Q1 to Q5 and the demo read.

      Z-scores are null, not zero, when there are fewer than 3 baseline days or the baseline has
      no variance. A z-score from one prior day is noise, and emitting it as a number would let
      it rank.
    columns:
      - name: identity_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_identity')
              field: identity_key
      - name: time_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_time')
              field: time_key
      - name: auth_count
        data_tests: [not_null]
      - name: distinct_dst_computers
        description: "Fan-out: distinct destination hosts this identity touched today. The lateral-movement precursor."
        data_tests: [not_null]
      - name: is_redteam_day
        data_tests: [not_null]
    # The (identity, day) grain claim is enforced by tests/assert_rollup_grain_is_unique.sql
    #, a grain documented but unchecked is just a comment.
