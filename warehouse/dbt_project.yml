name: tarn
version: "1.0.0"
config-version: 2

profile: tarn

model-paths: ["models"]
test-paths: ["tests"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  # Where the Spark-built Parquet lake lives. CI overrides this to point at the lake
  # built from data/sample/, so the exact same models run against the committed slice.
  #   dbt build --vars '{lake_path: /data/work/ci-lake}'
  lake_path: /data/lake

  # The Spark rollup output (Stage 1) and streaming windows (Stage 3) are read from the
  # lake too, so the warehouse never recomputes what Spark already computed.
  rollup_path: /data/lake/rollup
  streaming_path: /data/lake/streaming_windows

models:
  tarn:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
