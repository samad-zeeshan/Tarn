# Tarn — local stack. Spark/dbt/tests all run in the `tarn` image; Redpanda and Neo4j
# back Stages 3 and 4. Raw data is bind-mounted from OUTSIDE the OneDrive tree
# (DIRECTIVE rule 7) — override with TARN_DATA if your raw dir lives elsewhere.

services:
  tarn:
    build: .
    image: tarn:local
    container_name: tarn
    working_dir: /work
    volumes:
      - .:/work
      - ${TARN_DATA:-C:/data/tarn}:/data
    environment:
      TARN_RAW: /data/raw
      TARN_LAKE: /data/lake
      TARN_WORK: /data/work
      KAFKA_BOOTSTRAP: redpanda:9092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: tarnlocal1
    # Spark driver memory is set per-job; keep the container itself long-lived for exec.
    command: sleep infinity
    depends_on:
      - redpanda
      - neo4j

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: tarn-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5.26-community
    container_name: tarn-neo4j
    environment:
      NEO4J_AUTH: neo4j/tarnlocal1
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  neo4j-data:
