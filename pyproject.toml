[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", "warehouse/target", "warehouse/dbt_packages", "site/vendor"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle
    "F",    # pyflakes
    "I",    # import sorting
    "B",    # bugbear
    "UP",   # pyupgrade
    "SIM",  # simplify
]
ignore = [
    "E501",  # line length is handled by the formatter, and the long docstrings here are
             # deliberate, they carry the provenance notes.
]

[tool.ruff.lint.per-file-ignores]
# Tests assert on identity, and `is True` / `is False` is the correct spelling when the
# value's type is part of the assertion (Spark returns real bools, not truthy ints).
"tests/*" = ["E712"]

# The Databricks notebook is a NOTEBOOK, exported in source format. `spark` and `dbutils` are
# injected by the Databricks runtime and do not exist at lint time, and its `# COMMAND ------`
# cells import where the narrative needs them rather than all at the top. Rewriting it to
# satisfy a linter would make it stop being a notebook.
"pipeline/databricks/*" = ["F821", "E402"]
